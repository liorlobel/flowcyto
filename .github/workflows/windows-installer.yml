name: Windows installer

# Builds the Windows .exe on a Windows runner and packages it into an Inno Setup
# installer. Runs on version tags (attaching the installer to that release) and
# on manual dispatch (producing a downloadable artifact).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Read version from Cargo.toml
        id: ver
        shell: pwsh
        run: |
          $v = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "flowcyto version: $v"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} packaging\windows\flowcyto.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowcyto-${{ steps.ver.outputs.version }}-windows-installer
          path: packaging/windows/Output/*.exe
          if-no-files-found: error

      - name: Attach installer to the release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = (Get-ChildItem packaging/windows/Output/*.exe | Select-Object -First 1).FullName
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "flowcyto $tag" --generate-notes
          }
          gh release upload $tag "$exe" --clobber
